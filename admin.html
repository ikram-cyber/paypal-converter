<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin – PayPal Converter</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="loading-overlay" id="loading">
  <div class="spinner"></div>
</div>

<div class="navbar">
  <h1>⚙️ Admin Panel</h1>
  <button onclick="logoutAdmin()"
    style="background:none; border:none; color:white; cursor:pointer;">
    Keluar
  </button>
</div>

<div class="container"
  style="padding-bottom: 80px; padding-top: 20px;">

  <!-- LOGIN ADMIN -->
  <div id="loginAdmin">
    <div style="text-align:center; margin-bottom:30px;">
      <div style="font-size:50px;">🔐</div>
      <h2>Login Admin</h2>
    </div>
    <div class="card">
      <div id="alertAdmin"></div>
      <input type="password" id="passwordAdmin" 
        placeholder="Masukkan password admin" />
      <button class="btn" onclick="cekPasswordAdmin()">
        MASUK ADMIN
      </button>
    </div>
  </div>

  <!-- PANEL ADMIN -->
  <div id="panelAdmin" style="display:none;">

    <!-- STATISTIK -->
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
      <div class="card" style="text-align:center;">
        <p style="color:#888; font-size:12px;">Total Transaksi</p>
        <h2 id="totalTrx" style="color:#0070ba;">0</h2>
      </div>
      <div class="card" style="text-align:center;">
        <p style="color:#888; font-size:12px;">Menunggu</p>
        <h2 id="totalMenunggu" style="color:#ffff6b;">0</h2>
      </div>
      <div class="card" style="text-align:center;">
        <p style="color:#888; font-size:12px;">Sukses</p>
        <h2 id="totalSukses" style="color:#6bff6b;">0</h2>
      </div>
      <div class="card" style="text-align:center;">
        <p style="color:#888; font-size:12px;">Ditolak</p>
        <h2 id="totalGagal" style="color:#ff6b6b;">0</h2>
      </div>
    </div>

    <!-- FILTER STATUS -->
    <div class="card">
      <select id="filterStatus" onchange="filterTransaksi()">
        <option value="semua">Semua Transaksi</option>
        <option value="menunggu_pembayaran">⏳ Menunggu</option>
        <option value="sukses">✅ Sukses</option>
        <option value="gagal">❌ Ditolak</option>
      </select>
    </div>

    <!-- LIST TRANSAKSI -->
    <div id="listAdminTrx">
      <p style="color:#888; text-align:center;">
        Memuat transaksi...
      </p>
    </div>

  </div>

</div>

<script type="module" src="admin.js"></script>
</body>
</html>
