<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tukar PayPal – PayPal Converter</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="loading-overlay" id="loading">
  <div class="spinner"></div>
</div>

<div class="navbar">
  <button onclick="history.back()" 
    style="background:none; border:none; color:white; cursor:pointer;">
    ← Kembali
  </button>
  <h1>💸 Tukar PayPal</h1>
  <div></div>
</div>

<div class="container" 
  style="padding-bottom: 80px; padding-top: 20px;">

  <div id="alertBox"></div>

  <!-- INPUT NOMINAL -->
  <div class="card">
    <h3 style="margin-bottom:15px;">Nominal Penukaran</h3>
    <p style="color:#888; font-size:13px;">Minimal $1.2 USD</p>
    <input type="number" id="nominalUSD" 
      placeholder="Contoh: 5.00"
      min="1.2" step="0.01" 
      oninput="hitungKonversi()" />

    <div style="background:#0f0f1a; border-radius:8px; 
      padding:12px; margin-top:10px;">
      <div style="display:flex; justify-content:space-between; 
        margin:5px 0;">
        <span style="color:#888;">Kurs:</span>
        <span id="infoKurs" style="color:#0070ba;">
          Loading...
        </span>
      </div>
      <div style="display:flex; justify-content:space-between; 
        margin:5px 0;">
        <span style="color:#888;">Hasil Konversi:</span>
        <span id="hasilIDR" style="color:white;">Rp 0</span>
      </div>
      <div style="display:flex; justify-content:space-between; 
        margin:5px 0;">
        <span style="color:#888;">Fee Admin:</span>
        <span style="color:#ffff6b;">- Rp 2.500</span>
      </div>
      <hr style="border-color:#333; margin:8px 0;">
      <div style="display:flex; justify-content:space-between; 
        margin:5px 0;">
        <span style="font-weight:bold;">Kamu Terima:</span>
        <span id="kamTerima" 
          style="color:#6bff6b; font-weight:bold; font-size:18px;">
          Rp 0
        </span>
      </div>
    </div>
  </div>

  <!-- PILIH TUJUAN -->
  <div class="card">
    <h3 style="margin-bottom:15px;">Tujuan Transfer</h3>

    <select id="jenisTujuan" onchange="toggleTujuan()">
      <option value="">-- Pilih Jenis --</option>
      <option value="bank">🏦 Transfer Bank</option>
      <option value="ewallet">📱 E-Wallet</option>
    </select>

    <!-- BANK -->
    <div id="sectionBank" style="display:none;">
      <select id="namaBank">
        <option value="">-- Pilih Bank --</option>
        <option value="BCA">BCA</option>
        <option value="BRI">BRI</option>
        <option value="BNI">BNI</option>
        <option value="Mandiri">Mandiri</option>
        <option value="BSI">BSI</option>
        <option value="CIMB">CIMB Niaga</option>
        <option value="Permata">Permata Bank</option>
      </select>
      <input type="text" id="nomorRekening" 
        placeholder="Nomor Rekening" maxlength="20" />
      <input type="text" id="namaPenerima" 
        placeholder="Nama Pemilik Rekening" />
    </div>

    <!-- EWALLET -->
    <div id="sectionEwallet" style="display:none;">
      <select id="namaEwallet">
        <option value="">-- Pilih E-Wallet --</option>
        <option value="GoPay">GoPay</option>
        <option value="OVO">OVO</option>
        <option value="Dana">DANA</option>
        <option value="ShopeePay">ShopeePay</option>
        <option value="LinkAja">LinkAja</option>
      </select>
      <input type="text" id="nomorEwallet" 
        placeholder="Nomor HP E-Wallet" maxlength="15" />
      <input type="text" id="namaEwalletPemilik" 
        placeholder="Nama Pemilik E-Wallet" />
    </div>
  </div>

  <!-- TOMBOL KONFIRMASI -->
  <button class="btn" id="btnKonfirmasi" 
    onclick="konfirmasiTransaksi()" disabled>
    KONFIRMASI TUKAR
  </button>

</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <a href="dashboard.html">🏠<span>Home</span></a>
  <a href="convert.html" class="active">💸<span>Tukar</span></a>
  <a href="history.html">📋<span>Riwayat</span></a>
</div>

<script type="module" src="convert.js"></script>
</body>
</html>
