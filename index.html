<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZYNC | Holo-Matrix Engine</title>
    <meta name="theme-color" content="#020617">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&display=swap');
        
        :root {
            --zync-cyan: #06b6d4; --zync-glow: rgba(34, 211, 238, 0.6);
            --bg-base: #020617; --glass-bg: rgba(15, 23, 42, 0.6);
        }

        body { font-family: 'Inter', sans-serif; background-color: var(--bg-base); color: #f8fafc; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        
        /* HOLO-MATRIX UI (Beda dari IG) */
        .glass-panel { background: var(--glass-bg); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid rgba(34, 211, 238, 0.15); box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5); }
        .holo-nav { background: rgba(2, 6, 23, 0.8); backdrop-filter: blur(20px); border-radius: 100px; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 10px 40px rgba(0,0,0,0.8), 0 0 20px rgba(34,211,238,0.1); }
        
        .page { display: none; animation: holoFade 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; transform: scale(0.98); } 
        .page.active { display: block; }
        @keyframes holoFade { to { opacity: 1; transform: scale(1); } }
        
        /* NAV ITEMS */
        .nav-item { color: #64748b; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); position: relative; }
        .nav-item.active { color: var(--zync-cyan); transform: translateY(-4px) scale(1.1); text-shadow: 0 0 15px var(--zync-glow); }
        .nav-item.active::after { content: ''; position: absolute; bottom: -8px; left: 50%; transform: translateX(-50%); width: 4px; height: 4px; background: var(--zync-cyan); border-radius: 50%; box-shadow: 0 0 10px var(--zync-cyan); }
        
        /* 3D CARDS */
        .post-card { background: linear-gradient(145deg, rgba(30,41,59,0.8) 0%, rgba(15,23,42,0.9) 100%); border: 1px solid rgba(255,255,255,0.05); border-radius: 24px; transition: transform 0.2s; position: relative; overflow: hidden; }
        .post-card::before { content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%; background: linear-gradient(to right, transparent, rgba(34,211,238,0.05), transparent); transform: skewX(-20deg); animation: shine 6s infinite; pointer-events: none; }
        @keyframes shine { 0% { left: -100%; } 20% { left: 200%; } 100% { left: 200%; } }

        /* NEURAL NODES (Ganti nama Stories) */
        .node-ring { background: transparent; padding: 2px; border-radius: 50%; border: 2px dashed var(--zync-cyan); animation: spinNode 10s linear infinite; }
        .node-avatar { border-radius: 50%; border: 3px solid var(--bg-base); }
        @keyframes spinNode { 100% { transform: rotate(360deg); } }

        /* SCROLLBAR & INPUTS */
        ::-webkit-scrollbar { display: none; }
        input, textarea { background: rgba(255,255,255,0.03) !important; border: 1px solid rgba(255,255,255,0.1) !important; color: white !important; transition: 0.3s; }
        input:focus, textarea:focus { border-color: var(--zync-cyan) !important; box-shadow: 0 0 15px rgba(34,211,238,0.2); }

        /* HEART BURST */
        @keyframes heartBurst { 0% { transform: translate(-50%, -50%) scale(0); opacity: 0; } 50% { transform: translate(-50%, -50%) scale(1.5); opacity: 1; filter: drop-shadow(0 0 40px #f43f5e); } 100% { transform: translate(-50%, -50%) scale(1); opacity: 0; } }
        .center-heart { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 120px; color: #f43f5e; opacity: 0; pointer-events: none; z-index: 100; }
        .animate-burst { animation: heartBurst 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .is-liked { color: #f43f5e !important; text-shadow: 0 0 15px rgba(244,63,94,0.5); }
        
        /* GLITCH & PARTICLES */
        canvas#bg-canvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; pointer-events: none; opacity: 0.4; }
        .smart-tag { color: var(--zync-cyan); font-weight: 800; cursor: pointer; text-shadow: 0 0 5px var(--zync-glow); }
        .verified-badge { color: var(--zync-cyan); font-size: 12px; margin-left: 4px; filter: drop-shadow(0 0 5px var(--zync-cyan)); }

        /* MODALS */
        .bottom-sheet { position: fixed; bottom: -100%; left: 0; right: 0; background: rgba(15,23,42,0.95); backdrop-filter: blur(20px); border-radius: 32px 32px 0 0; z-index: 9999; transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1); border-top: 1px solid var(--zync-glow); max-height: 85vh; display: flex; flex-direction: column; }
        .bottom-sheet.open { bottom: 0; box-shadow: 0 -20px 60px rgba(0,0,0,0.8); }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(3px); z-index: 9998; display: none; opacity: 0; transition: 0.3s; }
        .overlay.open { display: block; opacity: 1; }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>
    <div id="overlay" class="overlay" onclick="window.closeAllModals()"></div>

    <div id="comment-modal" class="bottom-sheet h-[75vh]">

        </div>
    </div>

    <div id="p-auth" class="page active min-h-screen flex flex-col items-center justify-center px-6 text-center relative z-10">
        <div class="mb-12">
            <div class="w-28 h-28 rounded-3xl bg-cyan-500/10 border border-cyan-500/30 flex items-center justify-center text-cyan-400 text-6xl shadow-[0_0_50px_rgba(34,211,238,0.2)] mx-auto mb-6 relative overflow-hidden">
                <i class="fas fa-fingerprint relative z-10"></i>
                <div class="absolute inset-0 bg-cyan-400/20 animate-pulse"></div>
            </div>
            <h1 class="text-5xl font-black tracking-[0.3em] text-white">ZY<span class="text-cyan-400">NC</span></h1>
            <p class="text-[10px] font-mono uppercase tracking-[0.4em] mt-3 text-cyan-500">Decentralized Matrix</p>
        </div>
        
        <div class="w-full max-w-sm glass-panel rounded-[2rem] p-8">
            <h2 id="auth-title" class="text-lg font-bold mb-6 text-white uppercase tracking-widest border-b border-white/10 pb-4">Akses Sistem</h2>
            <div class="space-y-4">
                <div id="div-user" class="hidden"><input type="text" id="auth-user" placeholder="Create Identity (@username)" class="w-full rounded-xl px-5 py-4 text-sm"></div>
                <input type="email" id="auth-email" placeholder="Email Node" class="w-full rounded-xl px-5 py-4 text-sm">

            </div>

    </div>

    <div id="main-app" class="hidden relative z-10">
        
        <header id="main-header" class="fixed top-0 left-0 right-0 z-50 px-6 py-4 flex justify-between items-center bg-gradient-to-b from-[#020617] to-transparent">
            <h1 class="text-2xl font-black tracking-widest text-white drop-shadow-md">ZY<span class="text-cyan-400">NC</span></h1>
            <div class="flex items-center gap-6 text-xl text-white">

                </div>
                <i class="fas fa-microchip hover:text-cyan-400 cursor-pointer drop-shadow-md" onclick="alert('Terminal Akses Aktif')"></i>

        </header>

        <main id="p-home" class="page pt-20 pb-28">
            <div class="px-6 mb-2 text-xs font-black uppercase tracking-widest text-cyan-500">Active Nodes</div>
            <div class="flex gap-5 overflow-x-auto px-6 py-2 no-scrollbar border-b border-white/5 mb-4">
                <div class="flex flex-col items-center gap-2 shrink-0 cursor-pointer" onclick="window.bukaTab('post')">

                </div>
            </div>
        </main>

        <main id="p-profile" class="page pt-0 pb-28">

                <div class="absolute top-10 right-6 flex gap-5 text-xl text-white">
                    <i class="fas fa-cog hover:text-cyan-400 cursor-pointer" onclick="window.bukaTab('settings')"></i>
                </div>
            </div>
            
            <div class="px-6 relative -mt-16">
                <div class="flex justify-between items-end mb-4">
                    <div class="w-28 h-28 rounded-full bg-[#020617] p-1.5 relative">
                        <div class="absolute inset-0 rounded-full border-2 border-dashed border-cyan-500 animate-spin-slow"></div>
                        <img id="prof-avatar" src="" class="w-full h-full rounded-full object-cover">
                    </div>
                    <div class="flex gap-6 text-center mb-2">
                        <div><p class="font-black text-xl text-cyan-400" id="stat-posts">0</p><p class="text-[9px] text-slate-400 uppercase tracking-widest">Data</p></div>

                </div>

                <div>
                    <h2 class="font-black text-2xl text-white flex items-center gap-2"><span id="prof-name">User</span> <i id="prof-badge" class="hidden fas fa-check-circle text-cyan-500 text-sm"></i></h2>
                    <p class="text-sm text-cyan-400 font-mono mt-1" id="prof-user">@node</p>
                    
                    <div class="glass-panel p-4 rounded-2xl mt-4 font-mono text-[10px] text-slate-300 space-y-2">

                        <p>> SYS_AURA: <span id="aura-val" class="font-bold text-emerald-400">0</span> PT</p>

            </div>

            <div class="flex mt-8 border-b border-white/5 sticky top-0 bg-[#020617] z-20">
                <button class="flex-1 py-4 text-center border-b-2 border-cyan-500 text-cyan-400"><i class="fas fa-th-large"></i></button>
                <button class="flex-1 py-4 text-center text-slate-600"><i class="fas fa-bolt"></i></button>
            </div>
            <div id="profile-grid" class="grid grid-cols-3 gap-1 px-1 py-1"></div>
        </main>

        <main id="p-settings" class="page pt-20 px-6 pb-28">
            <h2 class="font-black text-2xl uppercase tracking-widest text-white mb-8 border-b border-white/10 pb-4">Control Panel</h2>
            <div class="space-y-4">
                <div class="glass-panel p-5 rounded-2xl">
                    <h3 class="text-xs font-black uppercase text-cyan-500 mb-4">Edit Matrix</h3>
                    <input type="text" id="set-name" placeholder="Display Name" class="w-full bg-slate-900 rounded-xl px-4 py-3 text-sm outline-none border border-white/5 mb-3 text-white">
                    <textarea id="set-bio" rows="2" placeholder="Bio Slogan" class="w-full bg-slate-900 rounded-xl px-4 py-3 text-sm outline-none border border-white/5 mb-3 text-white"></textarea>
                    <input type="text" id="set-link" placeholder="External Link" class="w-full bg-slate-900 rounded-xl px-4 py-3 text-sm outline-none border border-white/5 mb-3 text-white">
                    <button onclick="window.saveProfile()" class="w-full bg-cyan-500 text-[#020617] py-3 rounded-xl font-black text-sm uppercase">Simpan Perubahan</button>
                </div>
                <div class="glass-panel p-5 rounded-2xl border-rose-500/30">
                    <h3 class="text-xs font-black uppercase text-rose-500 mb-4">Danger Zone</h3>
                    <button onclick="window.logout()" class="w-full bg-slate-800 text-white py-3 rounded-xl font-black text-sm uppercase mb-3">Disconnect</button>
                    <button onclick="window.purgeData()" class="w-full bg-rose-500/20 text-rose-500 py-3 rounded-xl font-black text-sm uppercase border border-rose-500/50">Hapus Data Lokal</button>
                </div>
            </div>
        </main>

        <nav id="main-bottom-nav" class="fixed bottom-6 left-1/2 transform -translate-x-1/2 holo-nav px-6 py-3 flex justify-between items-center z-50 w-[85%] max-w-sm">
            <button class="nav-item active text-xl" onclick="window.bukaTab('home')" id="nav-home"><i class="fas fa-layer-group"></i></button>
            <button class="nav-item text-xl" onclick="window.bukaTab('explore')" id="nav-explore"><i class="fas fa-compass"></i></button>
            <button class="nav-item text-3xl text-cyan-400" onclick="window.bukaTab('post')" id="nav-post"><i class="fas fa-plus-circle drop-shadow-[0_0_10px_rgba(34,211,238,0.8)]"></i></button>
            <button class="nav-item text-xl" onclick="window.bukaTab('reels')" id="nav-reels"><i class="fas fa-film"></i></button>
            <button class="nav-item w-8 h-8 rounded-full overflow-hidden border-2 border-slate-600" onclick="window.bukaTab('profile')" id="nav-profile"><img id="nav-my-avatar" src="" class="w-full h-full object-cover"></button>
        </nav>
    </div>

    <script>
        // BACKGROUND PARTICLES (MATRIX RAIN EFFECT)
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const particles = [];
        for(let i=0; i<50; i++) particles.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height, s: Math.random()*2+1, d: Math.random()*1+0.5});
        function drawBg() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            ctx.fillStyle = 'rgba(34, 211, 238, 0.5)';
            particles.forEach(p => {
                ctx.beginPath(); ctx.arc(p.x, p.y, p.s, 0, Math.PI*2); ctx.fill();
                p.y -= p.d; if(p.y < 0) p.y = canvas.height;
            });
            requestAnimationFrame(drawBg);
        }
        drawBg();

        // BATTERY API (Terminal Info)
        if(navigator.getBattery) {
            navigator.getBattery().then(b => {
                document.getElementById('battery-status').innerText = Math.round(b.level * 100) + '% ' + (b.charging ? '⚡' : '');
            });
        }

        // GLOBAL STATE
        window.isLoginMode = true;
        window.currentUser = JSON.parse(localStorage.getItem('zync_session'));
        window.aura = parseInt(localStorage.getItem('zync_aura')) || 0;
        window.currentPostIdForComment = null;
        
        // MOCKUP DATA LENGKAP (Agar UI langsung terlihat hidup)
        window.posts = JSON.parse(localStorage.getItem('zync_db')) || [
            { id: '1', name: "Zync Architect", user: "@zync_core", avatar: "https://api.dicebear.com/7.x/bottts/svg?seed=Zync", content: "Sistem Holo-Matrix Online! Tampilan dirombak 100% dari IG agar lebih canggih. Ketuk 2x untuk Like. #HoloMatrix #ZyncIt", img: "https://images.unsplash.com/photo-1550751827-4bd374c3f58b?w=800&q=80", likes: 9999, isLiked: false, verified: true, time: "Baru saja", comments: [{user: "@ikram", text: "Kliknya udah super lancar Bos!"}] },
            { id: '2', name: "Cyber Ninja", user: "@cyber_ninja", avatar: "https://api.dicebear.com/7.x/avataaars/svg?seed=Ninja", content: "Menjalankan skrip dari Termux. Kecepatannya luar biasa. #Tech #Termux", img: "", likes: 450, isLiked: false, verified: false, time: "1 jam lalu", comments: [] }
        ];

        window.reelsData = [ "https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=600&h=1200&fit=crop", "https://images.unsplash.com/photo-1526374965328-7f61d4dc18c5?w=600&h=1200&fit=crop" ];

        // UI & AUDIO ENGINES
        window.playSfx = (type = 'tap') => {
            try { 
                const actx = new (window.AudioContext || window.webkitAudioContext)(); 
                const osc = actx.createOscillator(); const gain = actx.createGain(); 
                osc.type = 'sine'; osc.frequency.setValueAtTime(type === 'pop' ? 800 : 300, actx.currentTime); 
                gain.gain.setValueAtTime(0.05, actx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, actx.currentTime + 0.1); 
                osc.connect(gain); gain.connect(actx.destination); osc.start(); osc.stop(actx.currentTime + 0.1); 
            } catch(e) {}
        };

        window.neuralPulse = () => { window.playSfx('pop'); setTimeout(() => window.playSfx('tap'), 100); };

        window.toggleAuth = () => {
            window.isLoginMode = !window.isLoginMode;
            document.getElementById('div-user').classList.toggle('hidden');
            document.getElementById('auth-title').innerText = window.isLoginMode ? "Akses Sistem" : "Generate Identitas";
            document.getElementById('auth-btn').innerText = window.isLoginMode ? "Initialize" : "Daftar";
            document.getElementById('auth-toggle-btn').innerText = window.isLoginMode ? "Generate Node Baru (Daftar)" : "Sudah punya akses? (Login)";
        };

        // FALLBACK LOCAL AUTH (Agar UI selalu jalan meski Firebase error)
        window.handleAuthLocal = () => {
            const email = document.getElementById('auth-email').value; const pass = document.getElementById('auth-pass').value; const user = document.getElementById('auth-user').value;
            if(!email || !pass) return alert("Data kosong!");
            let users = JSON.parse(localStorage.getItem('zync_users')) || [];
            if(window.isLoginMode) {
                const found = users.find(u => u.email === email && u.pass === pass);
                if(found) { localStorage.setItem('zync_session', JSON.stringify(found)); location.reload(); } else alert("Akses Ditolak.");
            } else {
                if(!user) return alert("Username kosong!");
                const isV = user.toLowerCase().includes('ikram');
                users.push({ user: "@"+user.replace(/\s+/g,'').toLowerCase(), email, pass, avatar: `https://api.dicebear.com/7.x/avataaars/svg?seed=${user}`, verified: isV, name: user, bio: "Node Lokal ZYNC.", link: "" });
                localStorage.setItem('zync_users', JSON.stringify(users)); alert("Berhasil!"); window.toggleAuth();
            }
        };

        // Assign default handler (Will be overridden by Firebase if connected)
        window.handleAuth = window.handleAuthLocal;

        window.bukaTab = (tabId) => {
            window.playSfx();
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            
            document.getElementById('p-' + tabId).classList.add('active');
            if(document.getElementById('nav-'+tabId)) document.getElementById('nav-'+tabId).classList.add('active');

            document.getElementById('main-header').style.display = (tabId === 'reels' || tabId === 'post' || tabId === 'settings') ? 'none' : 'flex';
            document.getElementById('main-bottom-nav').style.display = (tabId === 'settings') ? 'none' : 'flex';
            window.scrollTo(0,0);
            
            if(tabId === 'home') { window.renderFeed(); window.renderStories(); }
            if(tabId === 'explore') window.renderExplore();
            if(tabId === 'reels') window.renderReels();
            if(tabId === 'settings') { 
                document.getElementById('set-name').value = window.currentUser.name || ""; document.getElementById('set-bio').value = window.currentUser.bio || ""; document.getElementById('set-link').value = window.currentUser.link || "";
            }
            if(tabId === 'profile') {
                document.getElementById('prof-name').innerText = window.currentUser.name; 
                document.getElementById('prof-user').innerText = window.currentUser.user;
                if(window.currentUser.verified) document.getElementById('prof-badge').classList.remove('hidden');
                document.getElementById('prof-bio').innerText = window.currentUser.bio || "Menunggu Sinkronisasi...";
                document.getElementById('prof-link').innerText = window.currentUser.link || "";
                document.getElementById('aura-val').innerText = window.aura;
                let myPosts = window.posts.filter(p => p.user === window.currentUser.user); 
                document.getElementById('stat-posts').innerText = myPosts.length;
                window.renderProfileGrid(myPosts);
            }
        };

        window.processText = (text) => {
            let res = text.replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank" class="smart-link">$1</a>');
            res = res.replace(/#(\w+)/g, '<span class="smart-tag" onclick="alert(\'Akses Tagar: #$1\')">#$1</span>');
            return res;
        };

        window.handleDoubleTap = (id, element) => {
            const heart = element.querySelector('.center-heart'); heart.classList.remove('animate-burst'); void heart.offsetWidth; heart.classList.add('animate-burst');
            window.playSfx('pop');
            const p = window.posts.find(x => x.id === id);
            if(p && !p.isLiked) { p.isLiked = true; p.likes++; window.aura += 20; localStorage.setItem('zync_aura', window.aura); localStorage.setItem('zync_db', JSON.stringify(window.posts)); window.renderFeed(); }
        };

        window.toggleLike = (id) => {
            window.playSfx();
            const p = window.posts.find(x => x.id === id);
            if(p) { p.isLiked = !p.isLiked; p.likes += p.isLiked ? 1 : -1; localStorage.setItem('zync_db', JSON.stringify(window.posts)); window.renderFeed(); }
        };

        window.openComments = (id) => { window.currentPostIdForComment = id; document.getElementById('overlay').classList.add('open'); window.renderComments(window.posts.find(x => x.id === id).comments); document.getElementById('comment-modal').classList.add('open'); };
        window.closeComments = () => { document.getElementById('comment-modal').classList.remove('open'); document.getElementById('overlay').classList.remove('open'); };
        window.closeAllModals = () => { document.querySelectorAll('.bottom-sheet').forEach(s => s.classList.remove('open')); document.getElementById('overlay').classList.remove('open'); };

        window.renderComments = (comments) => {
            let html = comments.length === 0 ? '<p class="text-center text-slate-500 text-xs mt-4">Jadilah yang pertama merespon.</p>' : '';
            comments.forEach(c => { html += `<div class="flex gap-4 mb-4"><img src="https://api.dicebear.com/7.x/avataaars/svg?seed=${c.user}" class="w-10 h-10 rounded-full border border-cyan-500/30 bg-slate-800"><div><span class="font-bold text-sm text-cyan-400">${c.user}</span> <span class="text-sm text-slate-200">${window.processText(c.text)}</span></div></div>`; });
            document.getElementById('comment-list').innerHTML = html;
        };

        // Fallback Local Post (Will be overridden by Firebase)
        window.kirimPostLocal = () => {
            const c = document.getElementById('post-content').value; const img = document.getElementById('post-img').value;
            if(!c && !img) return;
            window.playSfx('pop'); window.aura += 50; localStorage.setItem('zync_aura', window.aura);
            window.posts.unshift({ id: Date.now().toString(), name: window.currentUser.name, user: window.currentUser.user, avatar: window.currentUser.avatar, content: c, img: img, likes: 0, isLiked: false, verified: window.currentUser.verified, time: "Baru saja", comments: [] });
            localStorage.setItem('zync_db', JSON.stringify(window.posts));
            document.getElementById('post-content').value = ""; document.getElementById('post-img').value = ""; window.bukaTab('home');
        };
        window.kirimPost = window.kirimPostLocal;

        window.postComment = () => {
            const input = document.getElementById('comment-input'); const txt = input.value.trim();
            if(!txt || !window.currentPostIdForComment) return;
            const p = window.posts.find(x => x.id === window.currentPostIdForComment);
            p.comments.push({user: window.currentUser.user, text: txt}); localStorage.setItem('zync_db', JSON.stringify(window.posts));
            input.value = ""; window.playSfx(); window.renderComments(p.comments); window.renderFeed();
        };

        window.renderFeed = () => {
            let h = '';
            window.posts.forEach(p => {
                let txt = window.processText(p.content);
                h += `
                <div class="post-card mb-6">
                    <div class="flex justify-between items-center px-5 py-4 border-b border-white/5">
                        <div class="flex items-center gap-3 cursor-pointer" onclick="alert('Profil Node')">
                            <img src="${p.avatar}" class="w-10 h-10 rounded-full border-2 border-cyan-500/50 bg-slate-800 object-cover">
                            <div class="flex flex-col"><span class="font-black text-sm text-white">${p.name} ${p.verified ? '<i class="fas fa-check-circle verified-badge"></i>' : ''}</span><span class="text-[10px] font-mono text-cyan-500">${p.user}</span></div>
                        </div>
                        <i class="fas fa-ellipsis-v text-slate-500" onclick="window.neuralPulse()"></i>
                    </div>
                    
                    <div class="relative w-full min-h-[80px] flex items-center justify-center bg-slate-900/50" ondblclick="window.handleDoubleTap('${p.id}', this)">
                        <i class="fas fa-heart center-heart"></i>
                        ${p.img ? `<img src="${p.img}" class="w-full h-auto max-h-[400px] object-cover">` : `<p class="px-6 py-8 text-base font-mono w-full text-left text-slate-200">${txt}</p>`}
                    </div>
                    
                    ${p.img ? `<div class="px-5 pt-4 text-sm font-mono text-slate-300"><span class="font-bold text-cyan-400 mr-2">${p.user}</span><span>${txt}</span></div>` : ''}

                    <div class="flex justify-between items-center px-5 py-4 text-2xl text-slate-400 border-t border-white/5 mt-2">
                        <div class="flex gap-6">
                            <i class="${p.isLiked ? 'fas is-liked' : 'far'} fa-heart transition-all cursor-pointer" onclick="window.toggleLike('${p.id}')"></i>
                            <i class="far fa-comment-dots cursor-pointer hover:text-cyan-400" onclick="window.openComments('${p.id}')"></i>
                            <i class="fas fa-satellite-dish cursor-pointer hover:text-cyan-400" onclick="window.neuralPulse()"></i>
                        </div>
                        <i class="far fa-bookmark cursor-pointer hover:text-cyan-400"></i>
                    </div>

                    <div class="px-5 pb-4 text-xs font-mono">
                        <p class="font-bold text-cyan-400 mb-1">${p.likes.toLocaleString()} SYNCS</p>
                        ${p.comments && p.comments.length > 0 ? `<p class="text-slate-500 mt-1 cursor-pointer hover:text-white" onclick="window.openComments('${p.id}')">Dekripsi ${p.comments.length} komentar...</p>` : ''}
                    </div>
                </div>`;
            });
            document.getElementById('feed-container').innerHTML = h;
        };

        window.renderStories = () => { let users = JSON.parse(localStorage.getItem('zync_users')) || []; document.getElementById('story-list').innerHTML = users.slice(0, 8).map(u => `<div class="flex flex-col items-center gap-2 shrink-0" onclick="window.playSfx()"><div class="w-16 h-16 rounded-full node-ring flex items-center justify-center p-0.5"><img src="${u.avatar}" class="w-full h-full node-avatar object-cover bg-slate-800"></div><span class="text-[10px] text-slate-400 truncate w-16 text-center font-mono">${u.user}</span></div>`).join(''); };
        window.renderExplore = () => { let imgs = window.posts.filter(p => p.img).map(p => `<div class="grid-item rounded-xl"><img src="${p.img}"></div>`).join(''); document.getElementById('explore-grid').innerHTML = imgs + imgs; };
        window.renderProfileGrid = (myPosts) => { let h = ''; myPosts.forEach(p => { if(p.img) h += `<div class="grid-item rounded-xl"><img src="${p.img}"></div>`; else h += `<div class="grid-item rounded-xl flex items-center justify-center p-3 text-center text-[10px] font-mono bg-slate-800 text-cyan-400 border border-cyan-500/20">${p.content.substring(0,40)}...</div>`; }); document.getElementById('profile-grid').innerHTML = h; };
        window.renderReels = () => { document.getElementById('reels-container').innerHTML = window.reelsData.map(url => `<div class="reel-item"><img src="${url}" class="w-full h-full object-cover opacity-60"><div class="absolute inset-0 bg-gradient-to-t from-black/80 to-transparent"></div><div class="absolute bottom-20 left-6 text-white"><div class="flex items-center gap-3 mb-3"><img src="https://api.dicebear.com/7.x/bottts/svg?seed=Zync" class="w-10 h-10 rounded-full border-2 border-cyan-500"><span class="font-black text-sm tracking-widest text-cyan-400">ZYNC_CORE</span></div><p class="text-sm font-mono">Visual Matrix Flow. #Cyber</p></div><div class="absolute bottom-20 right-4 flex flex-col gap-6 text-slate-300 items-center text-3xl drop-shadow-lg"><i class="fas fa-heart hover:text-rose-500" onclick="window.playSfx('pop')"></i><i class="fas fa-comment-dots"></i><i class="fas fa-share-nodes"></i></div></div>`).join(''); };

        window.saveProfile = () => { window.currentUser.name = document.getElementById('set-name').value; window.currentUser.bio = document.getElementById('set-bio').value; window.currentUser.link = document.getElementById('set-link').value; localStorage.setItem('zync_session', JSON.stringify(window.currentUser)); alert("Matrix Diperbarui!"); window.bukaTab('profile'); };
        window.logout = () => { localStorage.removeItem('zync_session'); location.reload(); };
        window.purgeData = () => { if(confirm("Hancurkan Data Lokal?")) { localStorage.clear(); location.reload(); } };

        // INITIALIZER
        window.onload = () => {
            if(window.currentUser) {
                document.getElementById('p-auth').style.display = 'none'; document.getElementById('main-app').classList.remove('hidden');
                document.getElementById('nav-my-avatar').src = window.currentUser.avatar; document.getElementById('post-my-avatar').src = window.currentUser.avatar; document.getElementById('prof-avatar').src = window.currentUser.avatar; document.getElementById('my-comment-avatar').src = window.currentUser.avatar;
                window.bukaTab('home');
            }
        };
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, doc, updateDoc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
        import { firebaseConfig } from "./firebase-config.js";

        try {
            const app = initializeApp(firebaseConfig);
            const auth = getAuth(app);
            const db = getFirestore(app);

            // OVERRIDE FUNGSI LOKAL DENGAN FUNGSI CLOUD FIREBASE
            window.handleAuth = async () => {
                const email = document.getElementById('auth-email').value; const pass = document.getElementById('auth-pass').value; const user = document.getElementById('auth-user').value; const btn = document.getElementById('auth-btn');
                if(!email || !pass) return alert("Kredensial wajib diisi!");
                btn.innerText = "Connecting to Cloud..."; btn.disabled = true;
                try {
                    if(window.isLoginMode) { await signInWithEmailAndPassword(auth, email, pass); } 
                    else {
                        if(!user) throw new Error("Username kosong!");
                        const userCred = await createUserWithEmailAndPassword(auth, email, pass);
                        const isVerified = user.toLowerCase().includes('ikram');
                        await setDoc(doc(db, "users", userCred.user.uid), { uid: userCred.user.uid, user: "@"+user.replace(/\s+/g,'').toLowerCase(), name: user, avatar: `https://api.dicebear.com/7.x/avataaars/svg?seed=${user}`, verified: isVerified, bio: "Terhubung ke Cloud." });
                    }
                } catch (e) { alert("Matrix Cloud Error: " + e.message); window.handleAuthLocal(); } // Fallback ke lokal
                finally { btn.innerText = window.isLoginMode ? "Log In" : "Initialize"; btn.disabled = false; }
            };

            window.logout = () => { signOut(auth).then(() => { localStorage.removeItem('zync_session'); location.reload(); }); };

            onAuthStateChanged(auth, async (userAuth) => {
                if (userAuth) {
                    const userDoc = await getDoc(doc(db, "users", userAuth.uid));
                    if (userDoc.exists()) {
                        window.currentUser = userDoc.data();
                        document.getElementById('p-auth').style.display = 'none'; document.getElementById('main-app').classList.remove('hidden');
                        document.getElementById('nav-my-avatar').src = window.currentUser.avatar; document.getElementById('prof-avatar').src = window.currentUser.avatar;
                        
                        // LISTEN TO FIREBASE FIRESTORE REALTIME
                        const q = query(collection(db, "transmissions"), orderBy("timestamp", "desc"));
                        onSnapshot(q, (snapshot) => {
                            window.posts = [];
                            snapshot.forEach((doc) => { window.posts.push({ id: doc.id, ...doc.data() }); });
                            if(document.getElementById('p-home').classList.contains('active')) window.renderFeed();
                        });
                    }
                }
            });

            window.kirimPost = async () => {
                const c = document.getElementById('post-content').value; const img = document.getElementById('post-img').value;
                if(!c && !img) return; window.playSfx('pop');
                try {
                    await addDoc(collection(db, "transmissions"), { name: window.currentUser.name, user: window.currentUser.user, avatar: window.currentUser.avatar, verified: window.currentUser.verified, content: c, img: img, likes: 0, likedBy: [], comments: [], timestamp: new Date().toISOString() });
                    document.getElementById('post-content').value = ""; document.getElementById('post-img').value = ""; window.bukaTab('home');
                } catch(e) { window.kirimPostLocal(); } // Fallback
            };

        } catch(e) { console.warn("Firebase tidak terhubung. Mode Lokal Aktif."); }
    </script>
</body>
</html>
