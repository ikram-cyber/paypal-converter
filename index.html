<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZYNC | Identity Gateway</title>
    <meta name="theme-color" content="#020617">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
        
        :root { --zync-cyan: #06b6d4; --bg-base: #020617; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-base); color: #f8fafc; overflow: hidden; -webkit-tap-highlight-color: transparent; }
        
        .glass-panel { background: rgba(15, 23, 42, 0.65); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5); }
        
        input { background: rgba(255,255,255,0.03) !important; border: 1px solid rgba(255,255,255,0.1) !important; color: white !important; transition: 0.3s; }
        input:focus { border-color: var(--zync-cyan) !important; box-shadow: 0 0 15px rgba(34,211,238,0.2); outline: none; }
        
        canvas#bg-canvas { position: fixed; inset: 0; width: 100vw; height: 100vh; z-index: -1; pointer-events: none; opacity: 0.3; }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <div class="min-h-screen flex flex-col items-center justify-center px-6 text-center relative z-10">
        
        <div class="mb-10">
            <div class="w-28 h-28 rounded-3xl bg-cyan-500/10 border border-cyan-500/30 flex items-center justify-center text-cyan-400 text-6xl shadow-[0_0_50px_rgba(34,211,238,0.2)] mx-auto mb-6 relative">
                <i class="fas fa-fingerprint relative z-10"></i>
            </div>
            <h1 class="text-5xl font-black tracking-[0.3em] text-white" style="text-shadow: 0 0 20px rgba(34, 211, 238, 0.6);">ZY<span class="text-cyan-400">NC</span></h1>
            <p class="text-[10px] font-mono uppercase tracking-[0.4em] mt-3 text-cyan-500">Identity Gateway</p>
        </div>
        
        <div class="w-full max-w-sm glass-panel rounded-[2rem] p-8">
            <h2 id="auth-title" class="text-lg font-bold mb-6 text-white uppercase tracking-widest border-b border-white/10 pb-4">Initialize Access</h2>
            <div class="space-y-4">
                <div id="div-user" class="hidden">
                    <input type="text" id="auth-user" placeholder="Username" class="w-full rounded-xl px-5 py-4 text-sm">
                </div>
                <input type="email" id="auth-email" placeholder="Email Address" class="w-full rounded-xl px-5 py-4 text-sm">
                <input type="password" id="auth-pass" placeholder="Password" class="w-full rounded-xl px-5 py-4 text-sm">
                <button onclick="alert('Sistem utama ZYNC sedang dalam tahap reset / Wipe Out.')" id="auth-btn" class="w-full bg-cyan-500 hover:bg-cyan-400 text-[#020617] py-4 rounded-xl font-black text-sm uppercase tracking-widest mt-2 shadow-[0_0_15px_rgba(34,211,238,0.4)] transition-all">Masuk Matrix</button>
            </div>
            
            <div class="mt-6 flex flex-col gap-3 text-xs text-slate-400">
                <p><span id="auth-toggle-txt">Node Baru?</span> <button onclick="toggleAuth()" id="auth-toggle-btn" class="text-cyan-400 font-bold hover:underline">Daftar</button></p>
            </div>
        </div>

    </div>

    <script>
        // Matrix Background Particles
        const canvas = document.getElementById('bg-canvas'); 
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const particles = Array.from({length: 40}, () => ({x: Math.random()*canvas.width, y: Math.random()*canvas.height, s: Math.random()*2+1, d: Math.random()*1+0.5}));
        
        (function drawBg() { 
            ctx.clearRect(0,0,canvas.width,canvas.height); 
            ctx.fillStyle = 'rgba(34, 211, 238, 0.4)'; 
            particles.forEach(p => { 
                ctx.beginPath(); ctx.arc(p.x, p.y, p.s, 0, Math.PI*2); ctx.fill(); 
                p.y -= p.d; if(p.y < 0) p.y = canvas.height; 
            }); 
            requestAnimationFrame(drawBg); 
        })();

        // Toggle Login / Register
        let isLoginMode = true;
        function toggleAuth() {
            isLoginMode = !isLoginMode;
            document.getElementById('div-user').classList.toggle('hidden');
            document.getElementById('auth-title').innerText = isLoginMode ? "Initialize Access" : "Generate Identity";
            document.getElementById('auth-btn').innerText = isLoginMode ? "Masuk Matrix" : "Daftar";
            document.getElementById('auth-toggle-txt').innerText = isLoginMode ? "Node Baru?" : "Sudah punya akses?";
            document.getElementById('auth-toggle-btn').innerText = isLoginMode ? "Daftar" : "Login";
        }
    </script>
</body>
</html>
