<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PayPal Converter – Login</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="loading-overlay" id="loading">
  <div class="spinner"></div>
</div>

<div class="container" style="padding-top: 60px;">

  <!-- LOGO -->
  <div style="text-align:center; margin-bottom: 40px;">
    <div style="font-size: 60px;">💱</div>
    <h1 style="color: #0070ba; font-size: 28px;">PayPal Converter</h1>
    <p style="color: #888; margin-top: 5px;">Tukar PayPal ke Bank & E-Wallet</p>
  </div>

  <!-- FORM LOGIN -->
  <div class="card">
    <h2 style="margin-bottom: 20px; text-align:center;">Login</h2>

    <div id="alertBox"></div>

    <input type="email" id="email" placeholder="Email" />
    <input type="password" id="password" placeholder="Password" />

    <button class="btn" onclick="login()">MASUK</button>
    <button class="btn btn-outline" 
      onclick="window.location='register.html'">
      Belum punya akun? Daftar
    </button>
  </div>

</div>

<script type="module" src="auth.js"></script>
</body>
</html>
