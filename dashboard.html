<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard – PayPal Converter</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="navbar">
  <h1>💱 PayPal Converter</h1>
  <button onclick="logout()" 
    style="background:none; border:none; color:white; cursor:pointer;">
    Keluar
  </button>
</div>

<div class="container" 
  style="padding-bottom: 80px; padding-top: 20px;">

  <!-- WELCOME -->
  <div class="card">
    <p style="color:#888;">Selamat datang,</p>
    <h2 id="namaUser">Loading...</h2>
    <p style="color:#888; font-size:14px;" id="emailUser"></p>
  </div>

  <!-- KURS -->
  <div class="card">
    <p style="color:#888; font-size:14px;">Kurs Saat Ini</p>
    <h2 style="color:#0070ba;">
      $1 USD = <span id="kursIDR">Loading...</span>
    </h2>
    <p style="color:#888; font-size:12px;" id="lastUpdate"></p>
  </div>

  <!-- TOMBOL TUKAR -->
  <button class="btn" 
    style="font-size:18px; padding:18px;"
    onclick="window.location='convert.html'">
    💸 TUKAR SEKARANG
  </button>

  <!-- TRANSAKSI TERAKHIR -->
  <div class="card">
    <h3 style="margin-bottom:15px;">Transaksi Terakhir</h3>
    <div id="lastTrx">
      <p style="color:#888; text-align:center;">
        Belum ada transaksi
      </p>
    </div>
    <button class="btn btn-outline" style="margin-top:10px;"
      onclick="window.location='history.html'">
      Lihat Semua Riwayat
    </button>
  </div>

</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <a href="dashboard.html" class="active">
    🏠<span>Home</span>
  </a>
  <a href="convert.html">💸<span>Tukar</span></a>
  <a href="history.html">📋<span>Riwayat</span></a>
</div>

<script type="module" src="auth.js"></script>
<script type="module" src="convert.js"></script>


</body>
</html>
